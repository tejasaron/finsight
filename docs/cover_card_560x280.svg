<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#131c31"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="560" fill="url(#bg)"/>

  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="140" x2="1120" y2="140"/>
    <line x1="0" y1="280" x2="1120" y2="280"/>
    <line x1="0" y1="420" x2="1120" y2="420"/>
  </g>

  <!-- upward trend line motif, right side -->
  <polyline points="640,420 720,390 800,400 880,320 960,340 1040,220"
            fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <g fill="#5eead4">
    <circle cx="640" cy="420" r="7"/>
    <circle cx="720" cy="390" r="7"/>
    <circle cx="800" cy="400" r="7"/>
    <circle cx="880" cy="320" r="7"/>
    <circle cx="960" cy="340" r="7"/>
  </g>
  <circle cx="1040" cy="220" r="11" fill="#818cf8"/>
  <g fill="none" stroke="#334155" stroke-width="1.5">
    <circle cx="1040" cy="220" r="40"/>
  </g>
  <g fill="#818cf8" opacity="0.9">
    <circle cx="1080" cy="220" r="5"/>
    <circle cx="1000" cy="220" r="5"/>
    <circle cx="1040" cy="180" r="5"/>
    <circle cx="1040" cy="260" r="5"/>
  </g>

  <!-- title block, left side -->
  <text x="70" y="250" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="88" font-weight="700" fill="#f8fafc">FinSight</text>
  <text x="70" y="305" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#94a3b8">A Financial Data Analyst Agent</text>

  <text x="70" y="470" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#5eead4">Multi-Agent · ADK · MCP</text>
  <text x="70" y="505" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#64748b">Agents for Business — Kaggle AI Agents Intensive</text>
</svg>
